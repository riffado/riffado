name: Install Script

# Integration test for the one-line installer. Runs on PRs that touch the
# installer surface so a regression in `scripts/install.sh` or its routes
# fails CI before it reaches mesynx.r0073dl053r.com.

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/install.sh'
      - 'src/lib/install-script.ts'
      - 'src/app/install.sh/**'
      - 'src/app/[version]/install.sh/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/install-sh.yml'
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'src/lib/install-script.ts'
      - 'src/app/install.sh/**'
      - 'src/app/[version]/install.sh/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/install-sh.yml'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          # Lint with `sh` posture — install.sh must run on /bin/sh, not
          # bash. Treat warnings as errors.
          shellcheck -s sh -S warning scripts/install.sh

  install-smoke:
    # End-to-end smoke test of the installer via the raw-main path -- the
    # supported self-host path on this repo. (No GitHub release assets are
    # published, so the version-pinned path is intentionally not exercised
    # here; reinstate a pinned test once releases ship docker-compose.yml +
    # env.example.) Leaving the {{VERSION}} placeholder makes install.sh fetch
    # config from raw.githubusercontent main and bring up the CPU core stack;
    # whisperx sits behind the `gpu` profile and is skipped.
    #
    # On pull_request this installs main's published artifacts (raw main does
    # not reflect the PR), so it validates installer mechanics rather than the
    # PR's compose edits; ShellCheck above is the per-PR gate on the script.
    name: Install (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Pull a stable published image rather than the .env.example default
      # (dev) so the smoke test is deterministic.
      MESYNX_AI_VERSION: latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer non-interactively (raw-main path)
        run: |
          # No tty + no /dev/tty makes the installer take all defaults
          # (install dir $HOME/mesynx, APP_URL http://localhost:8790).
          # install.sh runs its own /api/health gate and exits non-zero on
          # failure, so a clean exit here IS the health verification.
          mkdir -p /tmp/installer
          cp scripts/install.sh /tmp/installer/install.sh
          chmod +x /tmp/installer/install.sh
          HOME=/tmp/run sh /tmp/installer/install.sh < /dev/null

      - name: Show running services
        run: docker compose -f /tmp/run/mesynx/docker-compose.yml ps

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f /tmp/run/mesynx/docker-compose.yml logs --no-color || true
