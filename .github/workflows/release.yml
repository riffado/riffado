name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to generate release notes for (e.g. v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "current=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "current=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-creatordate | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV" ]; then
            # First release — use initial commit
            PREV=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      # Pull release notes straight from CHANGELOG.md. The maintainer-curated
      # `## [X.Y.Z]` section is the single source of truth -- the workflow
      # just extracts it. Fail loud if the section is missing so we never
      # publish a release with empty / wrong notes (this is the CI gate that
      # keeps GitHub Releases, Docker tags, and CHANGELOG.md from drifting).
      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ steps.tag.outputs.current }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Print the [VERSION] section: from "## [VERSION]" up to (but not
          # including) the next "## [" heading. Use a plain-string prefix
          # match (index()) instead of a regex so the dots/brackets in the
          # version don't have to be escaped.
          BODY=$(awk -v prefix="## [${VERSION}]" '
            index($0, prefix) == 1 { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            echo "::error file=CHANGELOG.md::No '## [${VERSION}]' section found in CHANGELOG.md. Update CHANGELOG.md before tagging ${TAG}."
            exit 1
          fi
          {
            printf '%s\n' "$BODY"
            printf '\n---\n\n'
            printf 'Full changelog: [CHANGELOG.md](https://github.com/%s/blob/%s/CHANGELOG.md)\n' "$REPO" "$TAG"
            printf 'Install: see `docker-compose.yml` and `env.example` attached below, or follow [README \xe2\x86\x92 Quick Start](https://github.com/%s#-quick-start).\n' "$REPO"
          } > /tmp/release-body.md
          # Output name uses an underscore so `${{ steps.notes.outputs.body_path }}`
          # is parsed as a property access rather than `body - path`.
          echo "body_path=/tmp/release-body.md" >> "$GITHUB_OUTPUT"

      # softprops/action-gh-release renames hidden files (e.g. `.env.example`)
      # by prefixing them with `default.` on upload, which breaks predictable
      # download URLs. Copy to a non-hidden name so the asset is uploaded as
      # `env.example` and stays curl-friendly.
      - name: Prepare install artifacts
        run: cp .env.example env.example

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.current }}
          name: ${{ steps.tag.outputs.current }}
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: true
          # Attach self-host install artifacts so users can
          #   curl -fLO .../releases/latest/download/docker-compose.yml
          #   curl -fL  .../releases/latest/download/env.example -o .env
          # without cloning the repo.
          files: |
            docker-compose.yml
            env.example
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
