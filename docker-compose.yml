services:
  db:
    image: postgres:16-alpine
    container_name: mesynx-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Default preserved for backward compat with existing self-host
      # deploys. The one-line installer (scripts/install.sh) generates a
      # random POSTGRES_PASSWORD and writes it to .env. Existing operators
      # can rotate by setting POSTGRES_PASSWORD in .env, recreating the
      # `db` volume, and restoring from a backup.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mesynx-ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mesynx-network

  app:
    # Build from local source code
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/riffado/riffado:${MESYNX_AI_VERSION:-dev}
    container_name: mesynx-ai-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8790}:3000"
    # Lets the app reach AI services running on the host (Ollama, Open WebUI,
    # whisper) via http://host.docker.internal:<port>, which powers
    # Settings → AI Providers → "Scan for Local Services". Auto-injected by
    # Docker Desktop on Windows/Mac; required explicitly on Linux. Note: the
    # host service must listen on 0.0.0.0, not just 127.0.0.1 — e.g. start
    # Ollama with OLLAMA_HOST=0.0.0.0.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/mesynx-ai

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8790}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Storage (optional defaults)
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/audio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3
    networks:
      - mesynx-network

  whisper:
    # GPU: Use cuda image. CPU: Comment out cuda image and uncomment cpu image below.
    image: fedirz/faster-whisper-server:latest-cuda
    # image: fedirz/faster-whisper-server:latest-cpu
    container_name: mesynx-ai-whisper
    restart: unless-stopped
    ports:
      - "8397:8000"
    environment:
      # Enable Voice Activity Detection — skips non-speech segments before
      # they reach Whisper. Single biggest fix for hallucinations on long
      # recordings with pauses. Set to false only if VAD trims real speech.
      WHISPER__VAD_ENABLED: "true"
      # Allow larger chunked uploads (default 10 MB is too small for
      # recordings over ~15 minutes at standard bitrate).
      WHISPER__MAX_AUDIO_FILE_SIZE_MB: "500"
    # GPU: Enable deploy reservations. CPU: Comment out the entire deploy block below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      # Persist downloaded Whisper models across container recreates.
      # large-v3 is ~3 GB; without this it re-downloads every restart.
      - whisper_cache:/root/.cache/huggingface
    networks:
      - mesynx-network

  whisperx:
    # WhisperX: forced-alignment + speaker diarization over an OpenAI-compatible API.
    # GPU only — there is no CPU image for this service.
    # Diarization requires a Hugging Face token (HF_TOKEN) and a licence
    # acceptance on https://hf.co/pyannote/speaker-diarization-community-1
    image: ghcr.io/etalab-ia/whisperx-openai-api:latest
    container_name: mesynx-ai-whisperx
    restart: unless-stopped
    ports:
      - "8398:8000"
    environment:
      # API key the server will require on every request. Must match the
      # API key you enter in Mesynx AI → Settings → AI Providers.
      - API_KEY=${WHISPERX_API_KEY:-sk-placeholder}
      # Required for pyannote diarization models. Obtain a read token from
      # https://hf.co/settings/tokens after accepting the pyannote licence.
      - HF_TOKEN=${HF_TOKEN:-}
      # Default Whisper model. Append "-diarize" to a model name in Mesynx AI
      # (e.g. "large-v3-turbo-diarize") to activate speaker diarization.
      - TRANSCRIBE_MODEL=${WHISPERX_MODEL:-large-v3-turbo}
      # Number of audio chunks processed in parallel. Reduce to 8 on <16 GB VRAM.
      - BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    volumes:
      # Cache downloaded Whisper + diarization models across restarts.
      # pyannote models are ~3 GB; whisperx models are another ~3 GB.
      - whisperx_cache:/data/models
    networks:
      - mesynx-network

volumes:
  pgdata:
    driver: local
  audio:
    driver: local
  whisper_cache:
    driver: local
  whisperx_cache:
    driver: local

networks:
  mesynx-network:
    driver: bridge
