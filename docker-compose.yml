services:
  db:
    image: postgres:16-alpine
    container_name: mesynx-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      # Default preserved for backward compat with existing self-host
      # deploys. The one-line installer (scripts/install.sh) generates a
      # random POSTGRES_PASSWORD and writes it to .env. Existing operators
      # can rotate by setting POSTGRES_PASSWORD in .env, recreating the
      # `db` volume, and restoring from a backup.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mesynx-ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mesynx-network

  app:
    # Build from local source code
    build:
      context: .
      dockerfile: Dockerfile
    image: mesynx-ai:latest
    container_name: mesynx-ai-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8790}:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/mesynx-ai

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8790}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Storage (optional defaults)
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/audio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3
    networks:
      - mesynx-network

  whisper:
    # GPU: Use cuda image. CPU: Comment out cuda image and uncomment cpu image below.
    image: fedirz/faster-whisper-server:latest-cuda
    # image: fedirz/faster-whisper-server:latest-cpu
    container_name: mesynx-ai-whisper
    restart: unless-stopped
    ports:
      - "8397:8000"
    # GPU: Enable deploy reservations. CPU: Comment out the entire deploy block below.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      # Persist downloaded Whisper models across container recreates.
      # large-v3 is ~3 GB; without this it re-downloads every restart.
      - whisper_cache:/root/.cache/huggingface
    networks:
      - mesynx-network

  whisperx:
    # High-performance WhisperX server with forced alignment and diarization.
    image: ghcr.io/etalab-ia/whisperx-openai-api:latest
    container_name: mesynx-ai-whisperx
    restart: unless-stopped
    ports:
      - "8398:8000"
    environment:
      - API_KEY=${WHISPERX_API_KEY:-sk-placeholder}
      # Hugging Face token is required to download pyannote diarization models.
      - HF_TOKEN=${HF_TOKEN:-}
      - TRANSCRIBE_MODEL=${WHISPERX_MODEL:-large-v3-turbo}
      - BATCH_SIZE=16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      - whisperx_cache:/data/models
    networks:
      - mesynx-network

volumes:
  pgdata:
    driver: local
  audio:
    driver: local
  whisper_cache:
    driver: local
  whisperx_cache:
    driver: local

networks:
  mesynx-network:
    driver: bridge
