# Mesynx AI — production docker-compose (self-hosted install)
#
# This file is published as a release asset and downloaded by the one-line
# installer (scripts/install.sh). It pulls pre-built images from GHCR rather
# than building from source.
#
# Quick start (after running the installer, or manually):
#   curl -fLO https://github.com/r0073d-l053r/mesynx/releases/latest/download/docker-compose.yml
#   curl -fL  https://github.com/r0073d-l053r/mesynx/releases/latest/download/env.example -o .env
#   # Edit .env — set BETTER_AUTH_SECRET, ENCRYPTION_KEY, and APP_URL at minimum
#   docker compose pull
#   docker compose up -d
#
# Upgrade:
#   docker compose pull && docker compose up -d
#
# GPU note: `whisper` and `whisperx` are GPU services. If you are running
# CPU-only, comment out the `deploy: resources: reservations:` block for
# `whisper` and remove the `whisperx` service entirely (it has no CPU image).

services:
  db:
    image: postgres:16-alpine
    container_name: mesynx-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mesynx
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mesynx-network

  app:
    # Pulls the pre-built image from GitHub Container Registry.
    # MESYNX_AI_VERSION is written to .env by the installer (e.g. "0.5.6").
    # Leave it unset or set to "latest" to always track the newest stable release.
    image: ghcr.io/r0073d-l053r/mesynx:${MESYNX_AI_VERSION:-latest}
    container_name: mesynx-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8790}:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/mesynx

      # Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8790}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-}

      # Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # Storage (optional — defaults to local disk under /app/audio)
      DEFAULT_STORAGE_TYPE: ${DEFAULT_STORAGE_TYPE:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/audio}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    volumes:
      - audio:/app/audio
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 3s
      start_period: 30s
      retries: 3
    networks:
      - mesynx-network

  whisper:
    # GPU: Use the cuda image below (default). CPU: swap to the -cpu image.
    image: fedirz/faster-whisper-server:latest-cuda
    # image: fedirz/faster-whisper-server:latest-cpu
    container_name: mesynx-whisper
    restart: unless-stopped
    ports:
      - "8397:8000"
    environment:
      # VAD eliminates hallucinations on recordings with pauses.
      # Set to false only if VAD clips real speech at the start of sentences.
      WHISPER__VAD_ENABLED: "true"
      # Raise the upload cap — 10 MB (default) is too small for recordings
      # longer than ~15 min at standard bitrate.
      WHISPER__MAX_AUDIO_FILE_SIZE_MB: "500"
    # GPU: Enable the deploy block below. CPU: comment it out entirely.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    volumes:
      # Persist downloaded Whisper models (large-v3 is ~3 GB).
      - whisper_cache:/root/.cache/huggingface
    networks:
      - mesynx-network

  whisperx:
    # WhisperX: forced-alignment + speaker diarization. GPU only.
    # To enable diarization, set HF_TOKEN and accept the pyannote licence:
    # https://hf.co/pyannote/speaker-diarization-community-1
    image: ghcr.io/etalab-ia/whisperx-openai-api:latest
    container_name: mesynx-whisperx
    restart: unless-stopped
    ports:
      - "8398:8000"
    environment:
      - API_KEY=${WHISPERX_API_KEY:-sk-placeholder}
      - HF_TOKEN=${HF_TOKEN:-}
      - TRANSCRIBE_MODEL=${WHISPERX_MODEL:-large-v3-turbo}
      - BATCH_SIZE=${WHISPERX_BATCH_SIZE:-16}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0", "1" ]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v1/models" ]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    volumes:
      - whisperx_cache:/data/models
    networks:
      - mesynx-network

volumes:
  pgdata:
    driver: local
  audio:
    driver: local
  whisper_cache:
    driver: local
  whisperx_cache:
    driver: local

networks:
  mesynx-network:
    driver: bridge
